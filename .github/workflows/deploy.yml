name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            if [ ! -d "$HOME/olist-dataset" ]; then git clone https://github.com/Hnry-Gab/data-analytics-mdg5.git $HOME/olist-dataset; fi
            cd $HOME/olist-dataset
            git config --global --add safe.directory $HOME/olist-dataset
            git pull origin main
            docker-compose down || true
            docker-compose up -d --build
            docker system prune -f
