<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Olist Logistics - Simulador de Atraso</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🚚 Olist Logistics</h1>
            <p class="subtitle">Simulador de Previsão de Atrasos</p>
        </header>

        <main>
            <div class="card">
                <h2>Simular Novo Pedido</h2>
                <form id="predictionForm">
                    <div class="form-group">
                        <label for="cep_cliente">CEP do Cliente:</label>
                        <input
                            type="text"
                            id="cep_cliente"
                            name="cep_cliente"
                            placeholder="Ex: 01310100"
                            pattern="\d{8}"
                            maxlength="8"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="cep_vendedor">CEP do Vendedor:</label>
                        <input
                            type="text"
                            id="cep_vendedor"
                            name="cep_vendedor"
                            placeholder="Ex: 20040020"
                            pattern="\d{8}"
                            maxlength="8"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="categoria_produto">Categoria do Produto:</label>
                        <select id="categoria_produto" name="categoria_produto" required>
                            <option value="">Selecione...</option>
                            <option value="eletronicos">Eletrônicos</option>
                            <option value="moveis">Móveis</option>
                            <option value="esporte">Esporte</option>
                            <option value="beleza">Beleza</option>
                            <option value="moda">Moda</option>
                            <option value="casa">Casa</option>
                            <option value="alimentos">Alimentos</option>
                            <option value="brinquedos">Brinquedos</option>
                            <option value="automotivo">Automotivo</option>
                            <option value="livros">Livros</option>
                            <option value="outros">Outros</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="peso_produto_kg">Peso do Produto (kg):</label>
                        <input
                            type="number"
                            id="peso_produto_kg"
                            name="peso_produto_kg"
                            placeholder="Ex: 2.5"
                            step="0.01"
                            min="0.01"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="preco_frete">Preço do Frete (R$):</label>
                        <input
                            type="number"
                            id="preco_frete"
                            name="preco_frete"
                            placeholder="Ex: 15.00"
                            step="0.01"
                            min="0.01"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="peso_produto_volume_cm3">Volume do Produto (cm³):</label>
                        <input
                            type="number"
                            id="peso_produto_volume_cm3"
                            name="peso_produto_volume_cm3"
                            placeholder="Ex: 5000"
                            step="1"
                            min="1"
                            required
                        >
                    </div>

                    <button type="submit" class="btn-submit">Prever Atraso</button>
                </form>
            </div>

            <div id="resultCard" class="card result-card" style="display: none;">
                <h2>Resultado da Predição</h2>
                <div id="result"></div>
            </div>

            <div id="errorCard" class="card error-card" style="display: none;">
                <h2>Erro</h2>
                <div id="error"></div>
            </div>
        </main>

        <footer>
            <p>Olist Logistics Growth - Previsão de Atrasos 📦</p>
            <p><a href="/docs" target="_blank">API Docs</a> | <a href="/api/health" target="_blank">Health Check</a></p>
        </footer>
    </div>

    <script src="/static/js/app.js"></script>
</body>
</html>
